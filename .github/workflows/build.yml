name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'examples/**'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'examples/**'
      - '.gitignore'
  workflow_dispatch:

# Cancel older in-flight runs on the same ref — no point burning minutes
# on a commit that's already been superseded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    env:
      # sccache caches individual rustc invocations via the GitHub Actions
      # cache backend. Stacks on top of Swatinem/rust-cache (which caches the
      # whole target/ dir) — together they dramatically cut cold-build time.
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      # Disable incremental compilation in CI — it bloats the cache and
      # sccache gives us better reuse across runs anyway. (This is also
      # what Swatinem/rust-cache recommends.)
      CARGO_INCREMENTAL: "0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            final: gmcl_buttplug_win64.dll
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            final: gmcl_buttplug_linux64.dll
          - label: macos-x86_64
            os: macos-15-intel  # Intel runner — matches GMod's x86_64 macOS build
            target: x86_64-apple-darwin
            final: gmcl_buttplug_osx64.dll

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install sccache
        # sccache-action v0.0.9 is the latest release and still runs on Node 20.
        # Opt into the Node 24 runtime early to clear the deprecation warning;
        # drop this env block once mozilla-actions ships a Node 24 release.
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.target }}
          # Only write the cache from main — PR/feature-branch builds still
          # read the main cache but don't churn it with their own entries.
          # GitHub's 10GB per-repo quota evicts LRU, so keeping writes
          # centralized makes the cache much more effective.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build (release)
        # `cargo xtask build` compiles the cdylib AND writes the GMod-named
        # artifact (gmcl_buttplug_<platform>.dll) alongside it in one step.
        run: cargo xtask build --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.final }}
          path: target/${{ matrix.target }}/release/${{ matrix.final }}
          if-no-files-found: error
