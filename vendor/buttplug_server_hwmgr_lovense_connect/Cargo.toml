# Vendored copy of buttplug_server_hwmgr_lovense_connect 10.0.2 with a single
# patch: reqwest's `rustls` feature is swapped for `rustls-no-provider`.
#
# Upstream 10.0.2 asks for rustls's `ring` provider on its direct rustls dep
# AND for reqwest's `rustls` feature — the latter transitively enables
# `__rustls-aws-lc-rs`, which forces the aws-lc-rs provider (and NASM, on
# Windows i686 builds). Dropping to `rustls-no-provider` lets the top-level
# binary install a single `ring` CryptoProvider via `install_default()`, so
# only one crypto stack ships.
#
# Source verbatim from crates.io (Cargo.toml.orig content, path entries
# stripped just like `cargo publish` would). Bump the version number below
# whenever upstream publishes a new release.

[package]
name = "buttplug_server_hwmgr_lovense_connect"
version = "10.0.2"
authors = ["Nonpolynomial Labs, LLC <kyle@nonpolynomial.com>"]
description = "Buttplug Intimate Hardware Control Library - Core Library"
license = "BSD-3-Clause"
homepage = "http://buttplug.io"
repository = "https://github.com/buttplugio/buttplug.git"
readme = "./README.md"
keywords = ["usb", "serial", "hardware", "bluetooth", "teledildonics"]
edition = "2024"
exclude = ["examples/**"]

[lib]
name = "buttplug_server_hwmgr_lovense_connect"
path = "src/lib.rs"
test = true
doctest = true
doc = true

[package.metadata.docs.rs]
targets = []
features = ["default", "unstable"]

[dependencies]
buttplug_core = { version = "10.0.2", default-features = false }
buttplug_server = { version = "10.0.2", default-features = false }
buttplug_server_device_config = "10.0.3"
futures = "0.3.32"
futures-util = "0.3.32"
log = "0.4.29"
tokio = { version = "1.50.0", features = ["sync", "time"] }
async-trait = "0.1.89"
uuid = { version = "1.22.0", features = ["serde", "v4"] }
dashmap = { version = "6.1.0", features = ["serde"] }
tracing = "0.1.44"
thiserror = "2.0.18"
# PATCH: was `features = ["rustls"]` — see header comment.
reqwest = { version = "0.13.2", default-features = false, features = ["rustls-no-provider"] }
rustls = { version = "0.23.37", default-features = false, features = ["ring"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde-aux = "4.7.0"
